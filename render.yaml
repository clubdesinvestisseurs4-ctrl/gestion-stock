services:
  - type: web
    name: gestion-stock-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false
      - key: FRONTEND_URL
        sync: false
